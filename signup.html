<!DOCTYPE html>
<html lang="en" class="scroll-smooth">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
        content="Sign up for a PremiumCare Clinic account today to book appointments, view your medical history, and access telehealth services.">
    <title>Sign Up | PremiumCare Clinic</title>
    <link rel="icon" type="icon/png" href="./assets/img/favicon.ico.png">
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        clinic: {
                            primary: '#0D9488', // Teal 600
                            dark: '#0F766E',    // Teal 700
                            light: '#F0FDFA',   // Teal 50
                            mist: '#F9FAFB',    // Gray 50
                            ink: '#1F2937',     // Gray 800
                            accent: '#10B981',  // Emerald 500
                            trust: '#1E3A8A',   // Blue 900
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>

    <!-- Custom Style -->
    <link rel="stylesheet" href="./src/css/style.css">
    <style>
        /* ── Mobile interaction fixes for signup page ─────────── */
        .signup-card {
            position: relative;
            z-index: 20;
        }

        /* Eye-toggle buttons: must never become full-width on mobile */
        .pw-wrapper {
            position: relative;
            z-index: 1;
        }

        .pw-toggle-btn {
            position: absolute !important;
            right: 1rem;
            top: 50%;
            transform: translateY(-50%);
            width: auto !important;
            min-height: unset !important;
            min-width: unset !important;
            padding: 0.25rem;
            display: flex;
            align-items: center;
            justify-content: center;
            background: transparent;
            border: none;
            z-index: 5;
            pointer-events: auto;
            cursor: pointer;
        }

        /* Social login buttons: always 2-column, never stacking on mobile */
        .social-grid {
            display: grid !important;
            grid-template-columns: 1fr 1fr !important;
        }

        @media (max-width: 768px) {
            .signup-card input {
                padding: 1.25rem 2rem !important;
            }

            .signup-card input[type="password"],
            .signup-card input[type="text"] {
                padding-right: 3rem !important;
            }
        }
    </style>
</head>

<body
    class="auth-page bg-clinic-mist text-clinic-ink font-sans selection:bg-clinic-light selection:text-clinic-primary">



    <main class="min-h-screen flex items-center justify-center relative px-4 py-20 bg-clinic-mist">
        <!-- Background Decorative Elements: z-0 + pointer-events-none so they NEVER intercept clicks -->
        <div class="absolute inset-0 overflow-hidden pointer-events-none" style="z-index:0" aria-hidden="true">
            <div
                class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] bg-clinic-light rounded-full blur-[120px] opacity-40">
            </div>
            <div
                class="absolute bottom-[-10%] right-[-10%] w-[30%] h-[30%] bg-clinic-primary/10 rounded-full blur-[100px] opacity-40">
            </div>
        </div>

        <div class="w-full max-w-md" style="position:relative;z-index:10">
            <div
                class="signup-card bg-white rounded-[3.5rem] shadow-[0_50px_100px_-20px_rgba(30,58,138,0.1)] border border-white p-10 lg:p-12 space-y-10">
                <!-- Logo -->
                <div class="flex justify-center">
                    <a href="index.html" class="flex items-center gap-2">
                        <img src="./assets/img/logo-full.svg" alt="PremiumCare Logo" class="h-10 w-auto">
                    </a>
                </div>

                <div class="text-center space-y-3">
                    <h1 class="text-3xl font-black text-clinic-trust tracking-tight">Create Profile</h1>
                    <p class="text-gray-500 font-medium">Join our healthcare ecosystem for a personalized experience.
                    </p>
                </div>

                <form id="signup-form" class="space-y-6">
                    <div class="space-y-3">
                        <label class="text-xs font-black text-clinic-trust uppercase tracking-widest ml-1">Full
                            Name</label>
                        <input type="text" id="name" required placeholder="John Doe"
                            class="w-full px-8 py-5 rounded-2xl bg-clinic-mist border-none focus:ring-2 focus:ring-clinic-primary outline-none transition-all font-medium text-clinic-ink">
                    </div>

                    <div class="space-y-3">
                        <label class="text-xs font-black text-clinic-trust uppercase tracking-widest ml-1">Email
                            Address</label>
                        <input type="email" id="email" required placeholder="name@email.com"
                            class="w-full px-8 py-5 rounded-2xl bg-clinic-mist border-none focus:ring-2 focus:ring-clinic-primary outline-none transition-all font-medium text-clinic-ink">
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div class="space-y-3">
                            <label
                                class="text-xs font-black text-clinic-trust uppercase tracking-widest ml-1">Password</label>
                            <div class="pw-wrapper">
                                <input type="password" id="password" required placeholder="••••••••"
                                    class="w-full px-8 py-5 rounded-2xl bg-clinic-mist border-none focus:ring-2 focus:ring-clinic-primary outline-none transition-all font-medium text-clinic-ink pr-12">
                                <button type="button" class="pw-toggle-btn"
                                    onclick="togglePassword('password', 'eye-icon-1')" aria-label="Toggle password">
                                    <i id="eye-icon-1" data-lucide="eye" class="w-5 h-5 text-gray-400"></i>
                                </button>
                            </div>
                        </div>
                        <div class="space-y-3">
                            <label
                                class="text-xs font-black text-clinic-trust uppercase tracking-widest ml-1">Verify</label>
                            <div class="pw-wrapper">
                                <input type="password" id="confirm-password" required placeholder="••••••••"
                                    class="w-full px-8 py-5 rounded-2xl bg-clinic-mist border-none focus:ring-2 focus:ring-clinic-primary outline-none transition-all font-medium text-clinic-ink pr-12">
                                <button type="button" class="pw-toggle-btn"
                                    onclick="togglePassword('confirm-password', 'eye-icon-2')"
                                    aria-label="Toggle confirm password">
                                    <i id="eye-icon-2" data-lucide="eye" class="w-5 h-5 text-gray-400"></i>
                                </button>
                            </div>
                        </div>
                    </div>

                    <button type="submit" id="submit-btn"
                        class="w-full bg-clinic-trust text-white py-6 rounded-2xl font-black text-lg hover:bg-black transition-all shadow-2xl hover:scale-[1.02] active:scale-95 flex items-center justify-center gap-4 group">
                        Create Account
                        <i data-lucide="user-plus" class="w-6 h-6 group-hover:rotate-12 transition-transform"></i>
                    </button>
                </form>

                <div class="text-center">
                    <p class="text-sm font-medium text-gray-400">
                        Already have a profile?
                        <a href="login.html" class="font-black text-clinic-primary hover:underline ml-1">Sign In</a>
                    </p>
                </div>

                <div class="relative py-4">
                    <div class="absolute inset-0 flex items-center">
                        <div class="w-full border-t border-gray-100"></div>
                    </div>
                    <div
                        class="relative flex justify-center text-xs uppercase tracking-[0.2em] font-black text-gray-300">
                        <span class="bg-white px-4">Social Enrollment</span>
                    </div>
                </div>

                <div class="social-grid grid gap-4">
                    <button
                        class="flex items-center justify-center gap-2 py-4 border border-gray-100 rounded-2xl hover:bg-clinic-mist transition-all font-bold text-sm text-clinic-trust group">
                        <svg class="w-5 h-5 group-hover:scale-110 transition-transform" viewBox="0 0 24 24" fill="none"
                            xmlns="http://www.w3.org/2000/svg">
                            <path
                                d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"
                                fill="#4285F4" />
                            <path
                                d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"
                                fill="#34A853" />
                            <path
                                d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.26.81-.58z"
                                fill="#FBBC05" />
                            <path
                                d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"
                                fill="#EA4335" />
                        </svg>
                        Google
                    </button>
                    <button
                        class="flex items-center justify-center gap-2 py-4 border border-gray-100 rounded-2xl hover:bg-clinic-mist transition-all font-bold text-sm text-clinic-trust group">
                        <i data-lucide="apple" class="w-5 h-5 group-hover:scale-110 transition-transform"></i>
                        Apple ID
                    </button>
                </div>

                <!-- Mock Success (Hidden) -->
                <div id="signup-success" class="hidden text-center space-y-6 pt-4 animate-fade-in-up">
                    <div
                        class="w-20 h-20 bg-clinic-light text-clinic-primary rounded-full flex items-center justify-center mx-auto shadow-xl">
                        <i data-lucide="user-plus" class="w-10 h-10"></i>
                    </div>
                    <div class="space-y-2">
                        <h2 class="text-2xl font-black text-clinic-trust">Account Set</h2>
                        <p class="text-gray-500 font-medium">Provisioning your clinical workspace...</p>
                    </div>
                </div>
            </div>
        </div>
    </main>



    <!-- Scripts -->
    <script src="./src/js/api.js"></script>
    <script src="./src/js/main.js"></script>

    <script>
        document.getElementById('signup-form').addEventListener('submit', async function (e) {
            e.preventDefault();
            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const confirm = document.getElementById('confirm-password').value;

            if (password !== confirm) {
                alert('Passwords do not match');
                return;
            }

            const btn = document.getElementById('submit-btn');
            const success = document.getElementById('signup-success');

            // Mock loading
            btn.innerHTML = '<i data-lucide="loader-2" class="w-5 h-5 animate-spin"></i><span>Securing Account...</span>';
            btn.disabled = true;
            if (window.lucide) lucide.createIcons();

            try {
                // REAL SYSTEM ACTION: Persist user data
                await StorageService.registerUser({ name, email, password });
                // REAL SYSTEM ACTION: Set session
                await StorageService.login(email, password);

                setTimeout(() => {
                    this.classList.add('hidden');
                    success.classList.remove('hidden');
                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 1500);
                }, 1000);
            } catch (err) {
                alert('Error creating account: ' + err.message);
                btn.disabled = false;
                btn.innerHTML = '<span>Create Account</span>';
            }
        });

        function togglePassword(inputId, iconId) {
            const input = document.getElementById(inputId);
            const icon = document.getElementById(iconId);

            if (input.type === 'password') {
                input.type = 'text';
                icon.setAttribute('data-lucide', 'eye-off');
            } else {
                input.type = 'password';
                icon.setAttribute('data-lucide', 'eye');
            }
            if (window.lucide) {
                window.lucide.createIcons();
            }
        }
    </script>
</body>

</html>
